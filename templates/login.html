{% extends 'base.html' %}

{% block content %}
<div class="glass-panel">
    <h2 style="font-family: 'Syne', sans-serif; font-size: 28px; color: var(--primary); margin-bottom: 30px; text-align: center;">Employee Login</h2>
    
    <form method="POST" action="{{ url_for('login') }}" style="display: flex; flex-direction: column; gap: 20px;">
        <div style="position: relative;">
            <input type="text" name="employee_id" placeholder="Employee ID (Username)" required style="width: 100%; padding: 16px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif;">
        </div>
        <div style="position: relative;">
            <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 16px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif;">
        </div>
        
        <button type="submit" class="btn-primary" style="margin-top: 10px;">Login</button>
    </form>

    <div style="margin-top: 25px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <p style="color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 15px;">Don't have an account?</p>
        <a href="{{ url_for('register') }}" class="btn-secondary" style="margin-bottom: 15px;">Register New User</a><br>
        <a href="{{ url_for('index') }}" style="color: var(--primary); text-decoration: none; font-size: 14px; transition: 0.3s;">&larr; Return to Home</a>
    </div>
</div>

<style>
    /* Add a little hover effect to the home link */
    a[href="{{ url_for('index') }}"]:hover { color: #fff !important; text-shadow: 0 0 10px var(--glow-cyan); }
</style>
{% endblock %}

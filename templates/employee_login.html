{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 400px; padding: 40px 30px; text-align: center;">
    <div style="font-size: 45px; margin-bottom: 10px;">👨‍💻</div>
    <h2 style="font-family: 'Syne', sans-serif; font-size: 24px; color: var(--primary); margin-bottom: 30px;">Employee Login</h2>
    
    <form method="POST" action="{{ url_for('employee_login') }}" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="number" name="employee_id" placeholder="Employee ID" required class="form-input">
        <input type="password" name="password" placeholder="Password" required class="form-input">
        
        <button type="submit" class="btn-primary" style="margin-top: 10px; margin-bottom: 20px; padding: 14px;">Secure Login</button>
    </form>
    
    <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <p style="color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 10px;">Don't have an account?</p>
        <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s;">Register as Employee</a>
    </div>
</div>

<style>
    .form-input { width: 100%; padding: 14px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif; transition: all 0.3s ease;}
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px var(--glow-cyan);}
    a[href="{{ url_for('register') }}"]:hover { text-shadow: 0 0 10px var(--glow-cyan); }
</style>
{% endblock %}

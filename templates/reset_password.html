{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 500px; padding: 40px 30px; text-align: center;">
    <div style="display: inline-block; padding: 5px 15px; background: rgba(76, 209, 55, 0.2); border: 1px solid #4cd137; border-radius: 20px; color: #4cd137; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase;">Identity Verified</div>
    
    <h2 style="font-family: 'Syne', sans-serif; font-size: 24px; color: #fff; margin-bottom: 30px;">Create New Password</h2>
    
    <form method="POST" action="{{ url_for('reset_password') }}" style="display: flex; flex-direction: column; gap: 15px;">
        
        <div style="display: flex; flex-direction: column; text-align: left;">
            <input type="password" id="reset-password" name="password" placeholder="Enter New Secure Password" required class="form-input" onkeyup="checkPasswordStrength()">
            <div id="password-strength" style="font-size: 12px; margin-top: 5px; margin-left: 10px; min-height: 15px;"></div>
        </div>
        
        <button type="submit" class="btn-primary" style="margin-top: 10px; padding: 14px;">Update Password & Login</button>
    </form>
</div>

<style>
    .form-input { width: 100%; padding: 14px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif; transition: all 0.3s ease;}
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px var(--glow-cyan);}
</style>

<script>
    function checkPasswordStrength() {
        var strengthText = document.getElementById("password-strength");
        var pwd = document.getElementById("reset-password").value;
        var strength = 0;
        if(pwd.length > 5) strength += 1;
        if(pwd.length > 7) strength += 1;
        if(pwd.match(/[a-z]+/)) strength += 1;
        if(pwd.match(/[A-Z]+/)) strength += 1;
        if(pwd.match(/[0-9]+/)) strength += 1;
        if(pwd.match(/[$@#&!]+/)) strength += 1;

        if(pwd.length == 0) strengthText.innerHTML = "";
        else if(strength < 3) strengthText.innerHTML = "<span style='color: #e84118;'>Weak: Add numbers & special characters</span>";
        else if(strength >= 3 && strength < 5) strengthText.innerHTML = "<span style='color: #fbc531;'>Medium: Getting better</span>";
        else strengthText.innerHTML = "<span style='color: #4cd137;'>Strong: Highly secure!</span>";
    }
</script>
{% endblock %}
